# COLMAP 4.0.4 global_mapper options
# Generated from: colmap global_mapper -h
# Required path options have no COLMAP default; they are left blank.

# General options
project_path                                                             =                    # Optional .ini project file path.
default_random_seed                                                      = 0                  # Global fallback random seed.
log_target                                                               = stderr_and_file    # Destination for glog output.
log_path                                                                 =                    # Directory for log files.
log_level                                                                = 0                  # Verbosity level for VLOG messages.
log_severity                                                             = 0                  # Minimum severity: 0 info, 1 warning, 2 error, 3 fatal.
log_color                                                                = 1                  # Colorize terminal log output.

# Paths
database_path                                                            =                    # COLMAP database path.
image_path                                                               =                    # Input image directory.
output_path                                                              =                    # Output sparse reconstruction directory.
retain_best_model_only                                                   = 0                  # Keep only best model by registered images as output sparse/0.

# Global mapper options
GlobalMapper.image_list_path                                             =                    # Optional file listing images to reconstruct.
GlobalMapper.min_num_matches                                             = 15                 # Minimum verified matches for image pairs.
GlobalMapper.ignore_watermarks                                           = 0                  # Ignore pairs marked as watermark matches.
GlobalMapper.num_threads                                                 = -1                 # Number of CPU threads; -1 uses all available.
GlobalMapper.random_seed                                                 = -1                 # Global mapper random seed; -1 uses random seed.
GlobalMapper.decompose_relative_pose                                     = 1                  # Decompose relative poses when needed.
GlobalMapper.ba_num_iterations                                           = 3                  # Number of global BA refinement iterations.
GlobalMapper.skip_rotation_averaging                                     = 0                  # Skip rotation averaging stage.
GlobalMapper.skip_track_establishment                                    = 0                  # Skip global track establishment stage.
GlobalMapper.skip_global_positioning                                     = 0                  # Skip global camera/point positioning stage.
GlobalMapper.skip_bundle_adjustment                                      = 0                  # Skip global bundle adjustment stage.
GlobalMapper.skip_retriangulation                                        = 0                  # Skip retriangulation and final refinement stage.

# Track establishment
GlobalMapper.track_intra_image_consistency_threshold                     = 10                 # Max intra-image track consistency error.
GlobalMapper.track_required_tracks_per_view                              = 2147483647         # Required tracks per view before selection stops.
GlobalMapper.track_min_num_views_per_track                               = 3                  # Minimum observations per established track.

# Global positioning
GlobalMapper.gp_use_gpu                                                  = 1                  # Use GPU for global positioning when available.
GlobalMapper.gp_gpu_index                                                = -1                 # CUDA GPU index for global positioning; -1 chooses.
GlobalMapper.gp_optimize_positions                                       = 1                  # Optimize camera positions.
GlobalMapper.gp_optimize_points                                          = 1                  # Optimize 3D point positions.
GlobalMapper.gp_optimize_scales                                          = 1                  # Optimize relative translation scales.
GlobalMapper.gp_loss_function_scale                                      = 0.1                # Robust loss scale for global positioning.
GlobalMapper.gp_max_num_iterations                                       = 100                # Maximum Ceres iterations for global positioning.

# Bundle adjustment
GlobalMapper.ba_refine_focal_length                                      = 1                  # Optimize focal length in global mapper BA.
GlobalMapper.ba_refine_principal_point                                   = 0                  # Optimize principal point in global mapper BA.
GlobalMapper.ba_refine_extra_params                                      = 1                  # Optimize distortion and extra camera params.
GlobalMapper.ba_refine_sensor_from_rig                                   = 0                  # Optimize sensor poses inside rigs.
GlobalMapper.ba_refine_rig_from_world                                    = 1                  # Optimize rig poses in world coordinates.
GlobalMapper.ba_refine_points3D                                          = 1                  # Optimize 3D point coordinates.
GlobalMapper.ba_min_track_length                                         = 3                  # Minimum track length for BA points.
GlobalMapper.ba_ceres_use_gpu                                            = 1                  # Use Ceres CUDA solver when eligible.
GlobalMapper.ba_ceres_gpu_index                                          = -1                 # CUDA GPU index for BA; -1 chooses.
GlobalMapper.ba_ceres_loss_function_scale                                = 1                  # Robust loss scale for BA.
GlobalMapper.ba_ceres_max_num_iterations                                 = 200                # Maximum Ceres iterations for BA.
GlobalMapper.ba_skip_fixed_rotation_stage                                = 0                  # Skip fixed-rotation BA stage.
GlobalMapper.ba_skip_joint_optimization_stage                            = 0                  # Skip joint BA optimization stage.

# Retriangulation
GlobalMapper.tri_complete_max_reproj_error                               = 15                 # Max reprojection error when completing tracks.
GlobalMapper.tri_merge_max_reproj_error                                  = 15                 # Max reprojection error when merging tracks.
GlobalMapper.tri_min_angle                                               = 1                  # Minimum triangulation angle for new points.

# Rotation averaging
GlobalMapper.ra_use_gravity                                              = 0                  # Use gravity constraints in rotation averaging.
GlobalMapper.ra_use_stratified                                           = 1                  # Use stratified rotation averaging.
GlobalMapper.ra_max_rotation_error_deg                                   = 10                 # Max relative rotation error in degrees.

# Thresholds
GlobalMapper.max_angular_reproj_error_deg                                = 1                  # Max angular reprojection error in degrees.
GlobalMapper.max_normalized_reproj_error                                 = 0.01               # Max normalized reprojection error.
GlobalMapper.min_tri_angle_deg                                           = 1                  # Minimum triangulation angle in degrees.
