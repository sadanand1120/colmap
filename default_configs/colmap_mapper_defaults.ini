# COLMAP 4.0.4 mapper options
# Generated from: colmap mapper -h
# Required path options have no COLMAP default; they are left blank.

# General options
project_path                                                             =                    # Optional .ini project file path.
default_random_seed                                                      = 0                  # Global fallback random seed.
log_target                                                               = stderr_and_file    # Destination for glog output.
log_path                                                                 =                    # Directory for log files.
log_level                                                                = 0                  # Verbosity level for VLOG messages.
log_severity                                                             = 0                  # Minimum severity: 0 info, 1 warning, 2 error, 3 fatal.
log_color                                                                = 1                  # Colorize terminal log output.

# Paths
database_path                                                            =                    # COLMAP database path.
image_path                                                               =                    # Input image directory.
input_path                                                               =                    # Existing sparse model to continue from.
output_path                                                              =                    # Output sparse reconstruction directory.
retain_best_model_only                                                   = 1                  # MODIFIED from default 0; keep only best model by registered images as output sparse/0.

# Mapper model management
Mapper.min_num_matches                                                   = 15                 # Minimum verified matches for image pairs.
Mapper.ignore_watermarks                                                 = 0                  # Ignore pairs marked as watermark matches.
Mapper.multiple_models                                                   = 1                  # Reconstruct multiple disconnected models.
Mapper.max_num_models                                                    = 50                 # Maximum number of kept reconstructed models.
Mapper.max_model_overlap                                                 = 20                 # Stop if models share too many registered images.
Mapper.min_model_size                                                    = 10                 # Minimum images required to keep later models.

# Mapper initialization
Mapper.init_image_id1                                                    = -1                 # First seed image id; -1 chooses automatically.
Mapper.init_image_id2                                                    = -1                 # Second seed image id; -1 chooses automatically.
Mapper.init_num_trials                                                   = 200                # Maximum initialization/model attempts.
Mapper.init_min_num_inliers                                              = 100                # Minimum inliers for initial image pair.
Mapper.init_max_error                                                    = 4                  # Max reprojection error for initial pair RANSAC.
Mapper.init_max_forward_motion                                           = 0.95               # Max forward-motion ratio for initial pair.
Mapper.init_min_tri_angle                                                = 16                 # Minimum triangulation angle for initial pair.
Mapper.init_max_reg_trials                                               = 2                  # Max times an image can seed initialization.

# Registration
Mapper.structure_less_registration_fallback                              = 1                  # Try structure-less registration after 2D-3D fails.
Mapper.structure_less_registration_only                                  = 0                  # Use only structure-less registration.
Mapper.abs_pose_max_error                                                = 12                 # Max reprojection error for absolute pose RANSAC.
Mapper.abs_pose_min_num_inliers                                          = 30                 # Minimum inliers to accept image registration.
Mapper.abs_pose_min_inlier_ratio                                         = 0.25               # Minimum inlier ratio to accept image registration.
Mapper.max_reg_trials                                                    = 3                  # Max registration attempts per image.

# Reconstruction behavior
Mapper.extract_colors                                                    = 1                  # Extract image colors for reconstructed points.
Mapper.num_threads                                                       = -1                 # Number of CPU threads; -1 uses all available.
Mapper.random_seed                                                       = -1                 # Mapper random seed; -1 uses random seed.
Mapper.min_focal_length_ratio                                            = 0.1                # Minimum allowed focal/prior focal ratio.
Mapper.max_focal_length_ratio                                            = 10                 # Maximum allowed focal/prior focal ratio.
Mapper.max_extra_param                                                   = 1                  # Maximum allowed extra camera parameter magnitude.

# Mapper bundle adjustment
Mapper.ba_refine_focal_length                                            = 1                  # Optimize focal length in mapper BA.
Mapper.ba_refine_principal_point                                         = 0                  # Optimize principal point in mapper BA.
Mapper.ba_refine_extra_params                                            = 1                  # Optimize distortion and extra params in mapper BA.
Mapper.ba_refine_sensor_from_rig                                         = 1                  # Optimize sensor-from-rig transforms in mapper BA.
Mapper.ba_local_function_tolerance                                       = 1e-6               # MODIFIED from default 0; local BA objective-change stopping tolerance.
Mapper.ba_local_max_num_iterations                                       = 25                 # Maximum iterations for local BA solves.
Mapper.ba_global_frames_ratio                                            = 1.1                # Run global BA after registered-frame growth ratio.
Mapper.ba_global_points_ratio                                            = 1.1                # Run global BA after 3D-point growth ratio.
Mapper.ba_global_frames_freq                                             = 500                # Run global BA after this many new frames.
Mapper.ba_global_points_freq                                             = 250000             # Run global BA after this many new 3D points.
Mapper.ba_global_function_tolerance                                      = 1e-6               # MODIFIED from default 0; global BA objective-change stopping tolerance.
Mapper.ba_global_max_num_iterations                                      = 50                 # Maximum iterations for global BA solves.
Mapper.ba_global_max_refinements                                         = 5                  # Maximum repeated global BA refinement passes.
Mapper.ba_global_max_refinement_change                                   = 0.0005             # Stop global refinement below relative model change.
Mapper.ba_local_max_refinements                                          = 2                  # Maximum repeated local BA refinement passes.
Mapper.ba_local_max_refinement_change                                    = 0.001              # Stop local refinement below relative model change.
Mapper.ba_use_gpu                                                        = 1                  # MODIFIED from default 0; use Ceres CUDA solver for mapper BA when eligible.
Mapper.ba_gpu_index                                                      = -1                 # CUDA GPU index for mapper BA; -1 chooses.
Mapper.ba_min_num_residuals_for_cpu_multi_threading                      = 20                 # MODIFIED from default 50000; residual threshold before BA CPU multithreading.
Mapper.ba_local_num_images                                               = 6                  # Number of nearby images in local BA.
Mapper.ba_local_min_tri_angle                                            = 6                  # Minimum triangulation angle for local BA image choice.
Mapper.ba_global_ignore_redundant_points3D                               = 0                  # Drop redundant 3D points from first global BA pass.
Mapper.ba_global_ignore_redundant_points3D_min_coverage_gain             = 0.05               # Min coverage gain to keep point in reduced global BA.

# Filtering
Mapper.filter_max_reproj_error                                           = 4                  # Max reprojection error before filtering observations.
Mapper.filter_min_tri_angle                                              = 1.5                # Minimum triangulation angle before filtering points.

# Snapshots and fixed inputs
Mapper.snapshot_path                                                     =                    # Directory for periodic reconstruction snapshots.
Mapper.snapshot_frames_freq                                              = 0                  # Snapshot after this many newly registered frames.
Mapper.fix_existing_frames                                               = 0                  # Keep imported frame poses fixed.
Mapper.image_list_path                                                   =                    # Optional file listing images to reconstruct.
Mapper.constant_rig_list_path                                            =                    # Optional file listing rigs to keep constant.
Mapper.constant_camera_list_path                                         =                    # Optional file listing cameras to keep constant.
Mapper.max_runtime_seconds                                               = -1                 # Runtime limit in seconds; -1 disables.

# Triangulation
Mapper.tri_max_transitivity                                              = 1                  # Max correspondence transitivity for triangulation.
Mapper.tri_create_max_angle_error                                        = 2                  # Max angle error when creating new points.
Mapper.tri_continue_max_angle_error                                      = 2                  # Max angle error when continuing tracks.
Mapper.tri_merge_max_reproj_error                                        = 4                  # Max reprojection error when merging tracks.
Mapper.tri_complete_max_reproj_error                                     = 4                  # Max reprojection error when completing tracks.
Mapper.tri_complete_max_transitivity                                     = 5                  # Max transitivity when completing tracks.
Mapper.tri_re_max_angle_error                                            = 5                  # Max angle error during retriangulation.
Mapper.tri_re_min_ratio                                                  = 0.2                # Minimum inlier ratio during retriangulation.
Mapper.tri_re_max_trials                                                 = 1                  # Maximum retriangulation trials per image pair.
Mapper.tri_min_angle                                                     = 1.5                # Minimum triangulation angle for new points.
Mapper.tri_ignore_two_view_tracks                                        = 1                  # Ignore tracks seen by only two images.
