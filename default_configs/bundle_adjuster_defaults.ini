# COLMAP 4.0.4 bundle_adjuster options
# Generated from: colmap bundle_adjuster -h
# Required path options have no COLMAP default; they are left blank.

# General options
project_path                                                             =                    # Optional .ini project file path.
default_random_seed                                                      = 0                  # Global fallback random seed.
log_target                                                               = stderr_and_file    # Destination for glog output.
log_path                                                                 =                    # Directory for log files.
log_level                                                                = 0                  # Verbosity level for VLOG messages.
log_severity                                                             = 0                  # Minimum severity: 0 info, 1 warning, 2 error, 3 fatal.
log_color                                                                = 1                  # Colorize terminal log output.

# Paths
input_path                                                               =                    # Input sparse reconstruction directory.
output_path                                                              =                    # Output sparse reconstruction directory.

# Bundle adjustment parameters
BundleAdjustment.refine_focal_length                                     = 1                  # Optimize camera focal lengths.
BundleAdjustment.refine_principal_point                                  = 1                  # MODIFIED from default 0; optimize camera principal points.
BundleAdjustment.refine_extra_params                                     = 1                  # Optimize distortion and extra camera params.
BundleAdjustment.refine_rig_from_world                                   = 1                  # Optimize rig poses in world coordinates.
BundleAdjustment.refine_sensor_from_rig                                  = 1                  # Optimize sensor poses inside rigs.
BundleAdjustment.refine_points3D                                         = 1                  # Optimize 3D point coordinates.
BundleAdjustment.constant_rig_from_world_rotation                        = 0                  # Keep rig rotation fixed while allowing translation.
BundleAdjustment.min_track_length                                        = 0                  # Minimum track length for optimized points.

# Ceres solver parameters
BundleAdjustmentCeres.max_num_iterations                                 = 100                # Maximum Ceres nonlinear iterations.
BundleAdjustmentCeres.max_linear_solver_iterations                       = 200                # Maximum iterations inside iterative linear solves.
BundleAdjustmentCeres.function_tolerance                                 = 1e-6               # MODIFIED from default 0; stop when objective improvement is small.
BundleAdjustmentCeres.gradient_tolerance                                 = 0.0001             # Stop when gradient norm is small.
BundleAdjustmentCeres.parameter_tolerance                                = 0                  # Stop when parameter update is small.
BundleAdjustmentCeres.use_gpu                                            = 1                  # MODIFIED from default 0; use Ceres CUDA solver when eligible.
BundleAdjustmentCeres.gpu_index                                          = -1                 # CUDA GPU index; -1 lets COLMAP choose.
BundleAdjustmentCeres.min_num_images_gpu_solver                          = 2                  # MODIFIED from default 50; minimum image count before using GPU solver.
BundleAdjustmentCeres.min_num_residuals_for_cpu_multi_threading          = 50000              # Residual threshold before CPU multithreading.
BundleAdjustmentCeres.max_num_images_direct_dense_cpu_solver             = 0                  # MODIFIED from default 50; dense CPU direct solver image limit.
BundleAdjustmentCeres.max_num_images_direct_sparse_cpu_solver            = 1                  # MODIFIED from default 1000; sparse CPU direct solver image limit.
BundleAdjustmentCeres.max_num_images_direct_dense_gpu_solver             = 200                # Dense GPU direct solver image limit.
BundleAdjustmentCeres.max_num_images_direct_sparse_gpu_solver            = 4000               # Sparse GPU direct solver image limit.
