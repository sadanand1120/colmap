# COLMAP 4.0.4 view_graph_calibrator options
# Generated from: colmap view_graph_calibrator -h
# Required path options have no COLMAP default; they are left blank.

# General options
project_path                                                             =                    # Optional .ini project file path.
default_random_seed                                                      = 0                  # Global fallback random seed.
log_target                                                               = stderr_and_file    # Destination for glog output.
log_path                                                                 =                    # Directory for log files.
log_level                                                                = 0                  # Verbosity level for VLOG messages.
log_severity                                                             = 0                  # Minimum severity: 0 info, 1 warning, 2 error, 3 fatal.
log_color                                                                = 1                  # Colorize terminal log output.

# Paths
database_path                                                            =                    # COLMAP database path to calibrate in-place.

# View graph calibration
cross_validate_prior_focal_lengths                                       = 1                  # Upgrade pairs if camera focal priors validate.
min_calibrated_pair_ratio                                                = 0.5                # Min calibrated-pair ratio for valid focal priors.
reestimate_relative_pose                                                 = 1                  # Re-estimate relative poses after calibration.
min_focal_length_ratio                                                   = 0.1                # Minimum estimated/prior focal ratio.
max_focal_length_ratio                                                   = 10                 # Maximum estimated/prior focal ratio.
max_calibration_error                                                    = 2                  # Max pair calibration error before degeneracy.
relpose_max_error                                                        = 1                  # Max RANSAC error for relative pose re-estimation.
relpose_min_num_inliers                                                  = 30                 # Minimum inliers for re-estimated relative pose.
relpose_min_inlier_ratio                                                 = 0.25               # Minimum inlier ratio for re-estimated pose.
num_threads                                                              = -1                 # Number of CPU threads; -1 uses all available.
